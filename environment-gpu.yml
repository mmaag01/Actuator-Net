# Actuator Net — GPU environment (PC / NVIDIA RTX 5070 Ti, CUDA 12.8)
# Compatible with Miniforge.
# The RTX 5070 Ti (Blackwell) requires CUDA 12.8+; pytorch-cuda=12.8
# pulls the matching toolkit from the nvidia channel automatically.
#
# Setup (from Miniforge Prompt):
#   python setup_env.py
# Or manually:
#   conda env create -f environment-gpu.yml
#   conda activate actuator-net
#   python -m ipykernel install --user --name actuator-net --display-name "Actuator Net (GPU)"

name: actuator-net

channels:
  - pytorch          # official PyTorch GPU wheels
  - nvidia           # CUDA toolkit (required for pytorch-cuda)
  - conda-forge      # everything else (default Miniforge channel)

dependencies:
  - python=3.11

  # ── PyTorch + CUDA 12.8 ──────────────────────────────────────────────────
  - pytorch::pytorch=2.7.1
  - pytorch::pytorch-cuda=12.8

  # ── Data & ML ────────────────────────────────────────────────────────────
  - numpy>=1.26
  - pandas>=2.2
  - scikit-learn>=1.4
  - matplotlib>=3.8
  - joblib>=1.3
  - xgboost>=2.0

  # ── Jupyter kernel ───────────────────────────────────────────────────────
  - ipykernel>=6.29
