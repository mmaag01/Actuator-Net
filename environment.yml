# Actuator Net — CPU environment (laptop / integrated graphics)
# Compatible with Miniforge.
#
# Setup (from Miniforge Prompt):
#   python setup_env.py
# Or manually:
#   conda env create -f environment.yml
#   conda activate actuator-net
#   python -m ipykernel install --user --name actuator-net --display-name "Actuator Net (CPU)"

name: actuator-net

channels:
  - pytorch          # official PyTorch CPU wheels
  - conda-forge      # everything else (default Miniforge channel)

dependencies:
  - python=3.11

  # ── PyTorch (CPU-only) ───────────────────────────────────────────────────
  - pytorch::pytorch=2.7.1
  - pytorch::cpuonly

  # ── Data & ML ────────────────────────────────────────────────────────────
  - numpy>=1.26
  - pandas>=2.2
  - scikit-learn>=1.4
  - scipy>=1.11
  - matplotlib>=3.8
  - joblib>=1.3
  - xgboost>=2.0

  # ── Jupyter kernel ───────────────────────────────────────────────────────
  - ipykernel>=6.29
